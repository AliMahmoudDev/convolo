# Convolo — Deploy to Vercel (Production)
# Requires VERCEL_TOKEN secret to be configured
# Setup: GitHub → Repo Settings → Secrets → Actions → Add VERCEL_TOKEN

name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Check Vercel Token
        id: check-token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "⚠️ VERCEL_TOKEN not configured. Skipping deploy."
            echo "To set up: GitHub → Repo Settings → Secrets → Actions → Add VERCEL_TOKEN"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Vercel CLI
        if: steps.check-token.outputs.skip == 'false'
        run: npm i -g vercel@latest

      - name: Pull Vercel Environment
        if: steps.check-token.outputs.skip == 'false'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        if: steps.check-token.outputs.skip == 'false'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: steps.check-token.outputs.skip == 'false'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Skip Notice
        if: steps.check-token.outputs.skip == 'true'
        run: echo "⏭️ Deploy skipped — VERCEL_TOKEN not configured yet. This is expected until Vercel is linked."
