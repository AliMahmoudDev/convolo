# Convolo — Deploy to Vercel (Production)
# Auto-deploy is handled by Vercel's own GitHub integration.
# This workflow is kept as a manual fallback only.

name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check Vercel Token
        id: check-token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "⚠️ VERCEL_TOKEN not configured. Skipping deploy."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Vercel CLI
        if: steps.check-token.outputs.skip == 'false'
        run: npm i -g vercel@latest

      - name: Link Vercel Project
        if: steps.check-token.outputs.skip == 'false'
        run: vercel link --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel Environment
        if: steps.check-token.outputs.skip == 'false'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        if: steps.check-token.outputs.skip == 'false'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

      - name: Deploy to Vercel
        if: steps.check-token.outputs.skip == 'false'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Skip Notice
        if: steps.check-token.outputs.skip == 'true'
        run: echo "⏭️ Deploy skipped — VERCEL_TOKEN not configured yet."
